name: Release build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Shuttle release
    runs-on: macos-latest

    env:
      PROJECT: Shuttle.xcodeproj
      TARGET: Shuttle
      CONFIGURATION: Release
      BUILD_DIR: build/Release
      PRODUCT_PATH: build/Release/Shuttle.app
      ARTIFACT_NAME: Shuttle-${{ github.ref_type == 'tag' && github.ref_name || format('run-{0}', github.run_number) }}.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          set -euo pipefail

          xcodebuild \
            -project "$PROJECT" \
            -target "$TARGET" \
            -configuration "$CONFIGURATION" \
            CONFIGURATION_BUILD_DIR="$PWD/$BUILD_DIR" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM= \
            build

      - name: Package app
        run: |
          set -euo pipefail

          rm -f "$ARTIFACT_NAME"
          (
            cd "$BUILD_DIR"
            /usr/bin/zip -r -y "$GITHUB_WORKSPACE/$ARTIFACT_NAME" Shuttle.app
          )

      - name: Verify packaged app
        run: |
          set -euo pipefail

          file "$ARTIFACT_NAME"
          unzip -t "$ARTIFACT_NAME"
          unzip -l "$ARTIFACT_NAME" | sed -n '1,40p'

          VERIFY_DIR="$(mktemp -d)"
          unzip -q "$ARTIFACT_NAME" -d "$VERIFY_DIR"
          test -d "$VERIFY_DIR/Shuttle.app"
          test -x "$VERIFY_DIR/Shuttle.app/Contents/MacOS/Shuttle"

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RELEASE_TAG="$GITHUB_REF_NAME"
          RELEASE_TITLE="$GITHUB_REF_NAME"

          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes "" --prerelease

          gh release upload "$RELEASE_TAG" "$ARTIFACT_NAME" --clobber
