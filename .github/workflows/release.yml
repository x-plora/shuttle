name: Release build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Shuttle release
    runs-on: macos-latest

    env:
      PROJECT: Shuttle.xcodeproj
      TARGET: Shuttle
      CONFIGURATION: Release
      BUILD_DIR: build/Release
      PRODUCT_PATH: build/Release/Shuttle.app
      ARTIFACT_NAME: Shuttle-${{ github.ref_type == 'tag' && github.ref_name || format('run-{0}', github.run_number) }}.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          set -euo pipefail

          xcodebuild \
            -project "$PROJECT" \
            -target "$TARGET" \
            -configuration "$CONFIGURATION" \
            CONFIGURATION_BUILD_DIR="$PWD/$BUILD_DIR" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM= \
            build

      - name: Package app
        run: |
          set -euo pipefail

          ditto -c -k --keepParent "$PRODUCT_PATH" "$ARTIFACT_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: Shuttle
          path: ${{ env.ARTIFACT_NAME }}
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes ""

          gh release upload "$GITHUB_REF_NAME" "$ARTIFACT_NAME" --clobber
