name: Release build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Shuttle release
    runs-on: macos-latest

    env:
      PROJECT: Shuttle.xcodeproj
      TARGET: Shuttle
      CONFIGURATION: Release
      BUILD_DIR: build/Release
      PRODUCT_PATH: build/Release/Shuttle.app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          set -euo pipefail

          xcodebuild \
            -project "$PROJECT" \
            -target "$TARGET" \
            -configuration "$CONFIGURATION" \
            CONFIGURATION_BUILD_DIR="$PWD/$BUILD_DIR" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM= \
            build

      - name: Verify built app
        run: |
          set -euo pipefail

          test -d "$PRODUCT_PATH"
          test -x "$PRODUCT_PATH/Contents/MacOS/Shuttle"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: Shuttle
          path: ${{ env.PRODUCT_PATH }}
          if-no-files-found: error

      - name: Create GitHub prerelease
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RELEASE_TAG="$GITHUB_REF_NAME"
          RELEASE_TITLE="$GITHUB_REF_NAME"

          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes "" --prerelease
